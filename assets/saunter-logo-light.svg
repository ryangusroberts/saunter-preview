<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 1240 320" role="img" aria-label="Saunter">
  <title>Saunter</title>

  <!-- SAUNTER wordmark — white for dark backgrounds (footer use) -->
  <text x="620" y="210"
        font-family="'Aptos Serif', Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="200"
        letter-spacing="20"
        text-anchor="middle"
        fill="#FFFFFF">SAUNTER</text>

  <!-- Brass accent wave (top) — keeps brand color in dark mode -->
  <path d="M 220 275
           C 360 256, 490 246, 620 272
           S 880 308, 1020 270
           C 1012 280, 880 318, 690 292
           S 400 270, 260 292
           S 215 285, 220 275 Z"
        fill="#D9C28A" opacity="0.8" />

  <!-- Main brass wave (bottom) — strong brand accent on dark -->
  <path d="M 200 305
           C 360 282, 500 268, 620 292
           S 900 340, 1040 292
           C 1032 304, 900 348, 700 318
           S 380 295, 240 318
           S 195 312, 200 305 Z"
        fill="#A77A28" />
</svg>
